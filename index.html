<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello World</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #080810;
        --accent1: #ff2d55;
        --accent2: #0ff;
        --accent3: #ffe600;
        --text: #f0f0f0;
        --glow1: rgba(255, 45, 85, 0.6);
        --glow2: rgba(0, 255, 255, 0.5);
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "Space Mono", monospace;
        overflow: hidden;
        cursor: none;
      }

      /* ── Custom cursor ── */
      #cursor {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 9999;
        width: 18px;
        height: 18px;
        border: 2px solid var(--accent2);
        border-radius: 50%;
        pointer-events: none;
        transform: translate(-50%, -50%);
        transition:
          transform 0.08s ease,
          background 0.2s;
        mix-blend-mode: difference;
      }
      #cursor.click {
        transform: translate(-50%, -50%) scale(2.2);
        background: var(--accent2);
      }

      /* ── Canvas background ── */
      canvas#bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        opacity: 0.55;
      }

      /* ── Scene ── */
      .scene {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        gap: 0;
      }

      /* ── PRE-TAG ── */
      .tag {
        font-family: "Space Mono", monospace;
        font-size: clamp(0.65rem, 1.5vw, 0.9rem);
        color: var(--accent2);
        letter-spacing: 0.18em;
        opacity: 0;
        animation: fadeUp 0.6s ease forwards;
      }
      .tag.open {
        animation-delay: 0.3s;
      }
      .tag.close {
        animation-delay: 2.2s;
      }

      /* ── Main heading ── */
      .headline {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        text-align: center;
        max-width: 95vw;
        gap: 0.03em;
      }

      .headline .letter {
        font-family: "Bebas Neue", sans-serif;
        font-size: clamp(2rem, 7vw, 7rem);
        line-height: 0.9;
        display: inline-block;
        opacity: 0;
        transform: rotateX(90deg) translateY(40px);
      }
      .headline .letter:hover {
        color: var(--accent3);
        text-shadow:
          0 0 20px rgba(255, 230, 0, 0.8),
          0 0 60px rgba(255, 230, 0, 0.4),
          3px 3px 0 var(--accent1);
        cursor: none;
      }
      /* Stagger letters */
      .headline .letter:nth-child(1) {
        animation-delay: 0.55s;
      }
      .headline .letter:nth-child(2) {
        animation-delay: 0.65s;
      }
      .headline .letter:nth-child(3) {
        animation-delay: 0.75s;
      }
      .headline .letter:nth-child(4) {
        animation-delay: 0.85s;
      }
      .headline .letter:nth-child(5) {
        animation-delay: 0.95s;
      }
      .headline .letter:nth-child(6) {
        animation-delay: 1.1s;
      }
      .headline .letter:nth-child(7) {
        animation-delay: 1.2s;
      }
      .headline .letter:nth-child(8) {
        animation-delay: 1.3s;
      }
      .headline .letter:nth-child(9) {
        animation-delay: 1.4s;
      }
      .headline .letter:nth-child(10) {
        animation-delay: 1.5s;
      }

      /* ── Divider line ── */
      .line {
        width: 0;
        height: 2px;
        background: linear-gradient(90deg, var(--accent1), var(--accent2));
        box-shadow: 0 0 12px var(--glow2);
        margin: 0.5rem 0 0.8rem;
        animation: growLine 0.7s ease 1.9s forwards;
      }

      /* ── Subtitle ── */
      .subtitle {
        font-size: clamp(0.7rem, 1.8vw, 0.95rem);
        letter-spacing: 0.28em;
        color: var(--accent2);
        text-transform: uppercase;
        opacity: 0;
        animation: fadeUp 0.6s ease 2s forwards;
      }

      /* ── Pulse dot ── */
      .dot {
        margin-top: 2.8rem;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--accent1);
        opacity: 0;
        animation:
          fadeUp 0.4s ease 2.4s forwards,
          pulse 1.8s ease 2.8s infinite;
        box-shadow: 0 0 0 0 var(--glow1);
      }

      /* ── Click hint ── */
      .hint {
        margin-top: 1rem;
        font-size: 0.65rem;
        letter-spacing: 0.22em;
        color: rgba(255, 255, 255, 0.3);
        opacity: 0;
        animation: fadeUp 0.5s ease 2.8s forwards;
      }

      /* ── Glitch overlay text ── */
      .glitch-wrap {
        position: relative;
        display: flex;
        gap: 0.06em;
      }

      /* ── Keyframes ── */
      @keyframes flipIn {
        to {
          opacity: 1;
          transform: rotateX(0) translateY(0);
        }
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes growLine {
        to {
          width: min(480px, 80vw);
        }
      }
      @keyframes pulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 var(--glow1);
        }
        50% {
          box-shadow: 0 0 0 12px rgba(255, 45, 85, 0);
        }
      }

      /* ── Explosion burst on click ── */
      .burst {
        position: fixed;
        z-index: 8;
        pointer-events: none;
        border-radius: 50%;
        transform: translate(-50%, -50%) scale(0);
        animation: burst 0.6s ease-out forwards;
      }
      @keyframes burst {
        0% {
          transform: translate(-50%, -50%) scale(0);
          opacity: 1;
        }
        100% {
          transform: translate(-50%, -50%) scale(6);
          opacity: 0;
        }
      }

      /* ── Scanlines ── */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 2;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 3px,
          rgba(0, 0, 0, 0.08) 3px,
          rgba(0, 0, 0, 0.08) 4px
        );
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="cursor"></div>
    <canvas id="bg"></canvas>

    <main class="scene">
      <span class="tag open">&lt;h1&gt;</span>

      <div class="headline glitch-wrap" id="headline">
        <!-- Letters injected by JS -->
      </div>

      <div class="line"></div>
      <p class="subtitle">Welcome to the web</p>
      <span class="tag close">&lt;/h1&gt;</span>

      <div class="dot"></div>
      <p class="hint">[ click anywhere ]</p>
    </main>

    <script>
      /* ── Letter injection ── */
      const text = "HELLO V2";
      const hl = document.getElementById("headline");

      hl.innerHTML = "";

      [...text].forEach((ch, i) => {
        const span = document.createElement("span");

        span.className = "letter";
        span.textContent = ch === " " ? "\u00A0" : ch;

        span.style.animation =
          "flipIn 0.55s cubic-bezier(0.22,1,0.36,1) forwards";

        span.style.animationDelay = `${0.55 + i * 0.08}s`;

        hl.appendChild(span);
      });

      /* ── Custom cursor ── */
      const cur = document.getElementById("cursor");

      document.addEventListener("mousemove", (e) => {
        cur.style.left = e.clientX + "px";
        cur.style.top = e.clientY + "px";

        mx = e.clientX;
        my = e.clientY;
      });

      document.addEventListener(
        "touchmove",
        (e) => {
          mx = e.touches[0].clientX;
          my = e.touches[0].clientY;
        },
        { passive: true },
      );

      /* ── Canvas particle grid ── */
      const canvas = document.getElementById("bg");
      const ctx = canvas.getContext("2d");

      let W = 0;
      let H = 0;
      let dots = [];

      function resize() {
        const dpr = window.devicePixelRatio || 1;

        W = window.innerWidth;
        H = window.innerHeight;

        canvas.width = W * dpr;
        canvas.height = H * dpr;

        canvas.style.width = W + "px";
        canvas.style.height = H + "px";

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        init();
      }

      function init() {
        dots = [];

        const spacing = 55;

        const cols = Math.max(1, Math.floor(W / spacing));
        const rows = Math.max(1, Math.floor(H / spacing));

        for (let r = 0; r <= rows; r++) {
          for (let c = 0; c <= cols; c++) {
            const x = c * (W / cols);
            const y = r * (H / rows);

            dots.push({
              x,
              y,
              ox: x,
              oy: y,
              vx: 0,
              vy: 0,
              size: Math.random() * 1.2 + 0.3,
              phase: Math.random() * Math.PI * 2,
            });
          }
        }
      }

      let mx = window.innerWidth / 2;
      let my = window.innerHeight / 2;

      function draw(timeStamp) {
        ctx.clearRect(0, 0, W, H);

        const time = timeStamp * 0.001;

        dots.forEach((d) => {
          const dx = mx - d.ox;
          const dy = my - d.oy;

          const dist = Math.sqrt(dx * dx + dy * dy);

          const maxR = 130;

          if (dist > 0 && dist < maxR) {
            const force = (1 - dist / maxR) * 18;

            d.vx -= (dx / dist) * force * 0.06;
            d.vy -= (dy / dist) * force * 0.06;
          }

          d.vx += (d.ox - d.x) * 0.05;
          d.vy += (d.oy - d.y) * 0.05;

          d.vx *= 0.82;
          d.vy *= 0.82;

          d.x += d.vx;
          d.y += d.vy;

          const brightness =
            0.3 + 0.7 * Math.abs(Math.sin(time * 0.6 + d.phase));

          ctx.beginPath();
          ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(0,255,255,${brightness * 0.55})`;
          ctx.fill();
        });

        requestAnimationFrame(draw);
      }

      window.addEventListener("resize", resize);

      resize();
      requestAnimationFrame(draw);

      /* ── Click burst ── */
      function createBurst(x, y) {
        const colors = ["#ff2d55", "#00ffff", "#ffe600", "#a855f7"];

        if (cur) {
          cur.classList.add("click");

          setTimeout(() => {
            cur.classList.remove("click");
          }, 200);
        }

        for (let i = 0; i < 5; i++) {
          const burst = document.createElement("div");

          burst.className = "burst";

          const size = 20 + Math.random() * 30;

          burst.style.width = `${size}px`;
          burst.style.height = `${size}px`;
          burst.style.left = `${x}px`;
          burst.style.top = `${y}px`;

          burst.style.background =
            colors[Math.floor(Math.random() * colors.length)];

          burst.style.animationDelay = `${i * 60}ms`;

          document.body.appendChild(burst);

          setTimeout(() => {
            burst.remove();
          }, 1000);
        }

        document.querySelectorAll(".headline .letter").forEach((letter) => {
          const randomColor = colors[Math.floor(Math.random() * colors.length)];

          letter.style.color = randomColor;

          setTimeout(() => {
            letter.style.color = "";
          }, 800);
        });
      }

      document.addEventListener("click", (e) => {
        createBurst(e.clientX, e.clientY);
      });

      document.addEventListener("touchstart", (e) => {
        createBurst(e.touches[0].clientX, e.touches[0].clientY);
      });
    </script>
  </body>
</html>

name: Build and Deploy Docker

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate HTML
        run: |
          # Basic HTML validation - check if index.html exists and is valid
          if [ -f index.html ]; then
            echo "✓ index.html found"
            # Check for basic HTML structure
            if grep -q "<!doctype html" index.html || grep -q "<!DOCTYPE html" index.html; then
              echo "✓ Valid HTML structure"
            else
              echo "✗ Invalid HTML structure"
              exit 1
            fi
          else
            echo "✗ index.html not found"
            exit 1
          fi

      - name: Check Dockerfile
        run: |
          if [ -f Dockerfile ]; then
            echo "✓ Dockerfile exists"
          else
            echo "✗ Dockerfile not found"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t my-webproject:latest .
          echo "✓ Docker image built successfully"

      - name: Run container test
        run: |
          docker run -d --name test-container -p 8080:80 my-webproject:latest
          sleep 2
          # Test if container is running
          if [ $(docker ps | grep test-container | wc -l) -eq 1 ]; then
            echo "✓ Container running successfully"
          else
            echo "✗ Container failed to start"
            exit 1
          fi
          docker stop test-container
          docker rm test-container

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: my-webproject:latest

      - name: Log deployment success
        run: |
          echo "✓ Deployment pipeline completed"
          echo "Docker image ready for deployment"
